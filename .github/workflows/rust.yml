name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  setup:
    name: Install Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust (Stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

  parallel-tasks:
    name: Check ${{ matrix.task }} 
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        task: [fmt, clippy, build]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 1: Restore Cache BEFORE Running Any Task
      - name: Restore Cargo Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # Step 2: Run The Task (Will Fetch/Compile Missing Dependencies)
      - name: Run Task
        run: |
          if [ "${{ matrix.task }}" = "fmt" ]; then
            cargo fmt --all -- --check
          elif [ "${{ matrix.task }}" = "clippy" ]; then
            make clippy
          elif [ "${{ matrix.task }}" = "build" ]; then
            cargo build --verbose
          fi

      # Step 3: Cache the Updated Dependencies & Build Artifacts
      - name: Cache Updated Cargo Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

  install-tarpaulin:
    name: Install `cargo-tarpaulin`
    runs-on: ubuntu-latest
    needs: parallel-tasks
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Cargo Bin Cache
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-bin-${{ runner.os }}-

      - name: Install `cargo-tarpaulin`
        run: |
          if ! command -v cargo-tarpaulin &> /dev/null; then
            cargo install cargo-tarpaulin --locked
          fi

      - name: Cache Installed Cargo Binaries
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

  test-coverage:
    name: Run Test Coverage
    runs-on: ubuntu-latest
    needs: install-tarpaulin
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Restore Cargo Dependencies & Build Cache (Fix!)
      - name: Restore Cargo Dependencies Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # Restore Cargo Bin Cache (for cargo-tarpaulin)
      - name: Restore Cargo Bin Cache
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-bin-${{ runner.os }}-

      - name: Run Test Coverage
        run: | 
          echo "Checking tarpaulin installation..."
          cargo tarpaulin --version

          echo "Running test coverage..."
          cargo tarpaulin --tests --all-targets --cached --out xml -- --test-threads=4 --nocapture

      - name: Rename Coverage Report
        run: mv cobertura.xml coverage.xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  upload-coverage:
    name: Upload Coverage to Codecov
    runs-on: ubuntu-latest
    needs: test-coverage
    steps:
      - name: Download Persisted Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
