name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust (Stable)
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    # Cache Cargo dependencies and build artifacts
    - name: Cache Cargo Dependencies & Build Artifacts
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cargo-${{ runner.os }}-

    - name: Check Rust Formatting
      run: cargo fmt --all -- --check
  
    - name: Lint with Clippy
      run: make clippy 

    - name: Build
      run: cargo build --verbose

    # ENABLE this when repo is public 
    # - name: Build documentation
    #   run: cargo doc --no-deps

    # - name: Deploy to GitHub Pages
    #   uses: peaceiris/actions-gh-pages@v3
    #   with:
    #     github_token: ${{ secrets.GITHUB_TOKEN }}
    #     publish_dir: ./target/doc

    # Install `cargo-tarpaulin` with caching to avoid redundant installations
    - name: Cache Cargo Binaries (Cargo Install)
      uses: actions/cache@v3
      with:
        path: ~/.cargo/bin
        key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cargo-bin-${{ runner.os }}-

    - name: Install `cargo-tarpaulin`
      run: |
        if ! command -v cargo-tarpaulin &> /dev/null; then
          cargo install cargo-tarpaulin --locked
        fi

    - name: Run Test Coverage
      run: cargo tarpaulin --tests --all-targets --out xml
    
    - name: Rename Coverage Report
      run: mv cobertura.xml coverage.xml 

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}  
        files: coverage.xml
        fail_ci_if_error: true
