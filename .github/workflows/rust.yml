name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  setup:
    name: Install Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust (Stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

  cache:
    name: Cache Cargo Dependencies & Build Artifacts
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Cargo Dependencies & Binaries
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

  parallel-tasks:
    name: Check Format, Lint, and Build
    runs-on: ubuntu-latest
    needs: cache
    strategy:
      matrix:
        task: [fmt, clippy, build]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Cargo Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Task
        run: |
          if [ "${{ matrix.task }}" = "fmt" ]; then
            cargo fmt --all -- --check
          elif [ "${{ matrix.task }}" = "clippy" ]; then
            make clippy
          elif [ "${{ matrix.task }}" = "build" ]; then
            cargo build --verbose
          fi

  install-tarpaulin:
    name: Install `cargo-tarpaulin`
    runs-on: ubuntu-latest
    needs: cache
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Cargo Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install `cargo-tarpaulin`
        run: |
          cargo install cargo-tarpaulin --locked

      - name: Verify Tarpaulin Installation
        run: |
          echo "Checking if cargo-tarpaulin is installed..."
          ls -lah ~/.cargo/bin
          cargo tarpaulin --version || echo "Tarpaulin is still not found"

  test-coverage:
    name: Run Test Coverage
    runs-on: ubuntu-latest
    needs: install-tarpaulin
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Cargo Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Test Coverage
        run: cargo tarpaulin --tests --all-targets --out xml -- --test-threads=4 --nocapture

  rename-coverage:
    name: Rename Coverage Report
    runs-on: ubuntu-latest
    needs: test-coverage
    steps:
      - name: Rename Coverage Report
        run: mv cobertura.xml coverage.xml

  upload-coverage:
    name: Upload Coverage to Codecov
    runs-on: ubuntu-latest
    needs: rename-coverage
    steps:
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
