name: Release Sekrets

on:
  push:
    tags:
      - "v*" # Runs when you push a tag like v1.0.0

permissions:
  contents: write

jobs:
  build:
    name: Build & Release Sekrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release Binary
        run: cargo build --release

      - name: Package Release Files
        run: |
          mkdir sekrets-release
          cp target/release/sekrets sekrets-release/
          cp Makefile sekrets-release/
          cd sekrets-release
          tar -czvf sekrets-linux.tar.gz sekrets Makefile
          mv sekrets-linux.tar.gz ../

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: sekrets-linux.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: "Sekrets ${{ github.ref_name }}"
          body: "🚀 New release of Sekrets! Download and install with the steps below."
