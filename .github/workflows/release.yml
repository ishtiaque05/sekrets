name: Release Sekrets

on:
  push:
    tags:
      - "v*" # Runs when you push a tag like v1.0.0

  workflow_run:
    workflows: ["Rust"] 
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    name: Build & Release Sekrets
    runs-on: ubuntu-latest
    
    # ✅ Ensures the job runs only when:
    # 1. A tag is pushed (`github.ref_type == 'tag'`)
    # 2. Rust CI has passed (`workflow_run.conclusion == 'success'`)
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb
      
      - name: Extract and Format Version
        run: echo "LIB_VERSION=$(echo $GITHUB_REF_NAME | sed -E 's/^v//; s/rc/~rc/')" >> $GITHUB_ENV

      - name: Build Debian Package
        run: cargo deb --deb-version "$LIB_VERSION"

      - name: Build Release Binary
        run: cargo build --release

      - name: Package Release Files
        run: |
          mkdir sekrets-release
          cp target/release/sekrets sekrets-release/
          cp Makefile sekrets-release/
          cd sekrets-release
          tar -czvf sekrets-linux.tar.gz sekrets Makefile
          mv sekrets-linux.tar.gz ../

      - name: Create GitHub Release
        env:
          LIB_VERSION: ${{ env.LIB_VERSION }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sekrets-linux.tar.gz
            target/debian/*.deb
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: "Sekrets ${{ github.ref_name }}"
          body: |
            🚀 **New release of Sekrets!** Install using `apt` or manually:
            
            ### 📥 Manual Install:
            ```sh
            wget https://github.com/ishtiaque05/sekrets/releases/download/${{ github.ref_name }}/sekrets_${LIB_VERSION}_amd64.deb
            sudo dpkg -i sekrets_${{ github.ref_name }}_amd64.deb
            ```
          
