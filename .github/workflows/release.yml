name: Release Sekrets

on:
  push:
    tags:
      - "v*"

  workflow_run:
    workflows: ["Rust"] 
    types:
      - completed

permissions:
  contents: write

jobs:
  build-linux:
    name: Build & Release Sekrets (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install `cargo-deb`
        run: |
          if ! command -v cargo-deb &> /dev/null; then
            cargo install cargo-deb
          fi

      - name: Build Debian Package
        run: cargo deb --deb-version "$(echo $GITHUB_REF_NAME | sed -E 's/^v//')"

      - name: Build Linux Release Binary
        run: cargo build --release

      - name: Package Linux Files
        run: |
          mkdir sekrets-linux
          cp target/release/sekrets sekrets-linux/
          cp Makefile sekrets-linux/
          tar -czvf sekrets-linux.tar.gz -C sekrets-linux .

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: sekrets-linux
          path: |
            sekrets-linux.tar.gz
            target/debian/*.deb

  build-macos:
    name: Build & Release Sekrets (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build macOS Release Binary
        run: cargo build --release

      - name: Create macOS Package (.pkg)
        run: |
          mkdir -p sekrets-macos/pkgroot/usr/local/bin
          cp target/release/sekrets sekrets-macos/pkgroot/usr/local/bin/
          
          pkgbuild --identifier com.sekrets.app \
                   --version "$(echo $GITHUB_REF_NAME | sed -E 's/^v//')" \
                   --install-location /usr/local/bin \
                   --root sekrets-macos/pkgroot \
                   sekrets-macos.pkg

      - name: Upload macOS Package
        uses: actions/upload-artifact@v3
        with:
          name: sekrets-macos
          path: sekrets-macos.pkg

  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          LIB_VERSION: ${{ github.ref_name }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/sekrets-linux/sekrets-linux.tar.gz
            artifacts/sekrets-linux/*.deb
            artifacts/sekrets-macos/sekrets-macos.pkg
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: "Sekrets ${{ github.ref_name }}"
          body: |
            🚀 **New release of Sekrets ${{ github.ref_name }}**! 

            ### 🔄 Changes:
            - Bug fixes and improvements

            ### 🔍 Compare Changes:
            [View Diff](https://github.com/ishtiaque05/sekrets/compare/${{ github.ref_name }})

            ### 📥 Installation Instructions:

            **Linux (Debian-based)**
            ```sh
            wget https://github.com/ishtiaque05/sekrets/releases/download/${{ github.ref_name }}/sekrets_${{ github.ref_name }}_amd64.deb
            sudo dpkg -i sekrets_${{ github.ref_name }}_amd64.deb
            ```

            **Linux (Generic)**
            ```sh
            wget https://github.com/ishtiaque05/sekrets/releases/download/${{ github.ref_name }}/sekrets-linux.tar.gz
            tar -xzf sekrets-linux.tar.gz
            ./sekrets
            ```

            **macOS (Installer)**
            ```sh
            wget https://github.com/ishtiaque05/sekrets/releases/download/${{ github.ref_name }}/sekrets-macos.pkg
            sudo installer -pkg sekrets-macos.pkg -target /
            ```